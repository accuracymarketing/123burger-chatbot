<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>123Burger Demo</title>
    <style>
      body {
        margin: 0;
        color: #1e2a24;
        background: #fffdf8;
        font-family: Arial, sans-serif;
      }

      header {
        padding: 56px 24px;
        background: #1f4d3a;
        color: white;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 36px 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 44px;
      }

      p {
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>123Burger</h1>
      <p>Fresh halal burgers, chicken, fries, shakes, pickup, and Raleigh hospitality.</p>
    </header>
    <main>
      <h2>Welcome</h2>
      <p>This is a simple demo page. Click the question button in the bottom-right corner to try the chatbot.</p>
      <p>Ask: "What time do you close?", "What burgers do you have?", or "Are you halal?"</p>
    </main>
    <script src="/chatbot-widget.js"></script>
  </body>
</html>
